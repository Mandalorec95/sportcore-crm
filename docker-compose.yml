services:
  postgres:
    image: postgres:16-alpine
    container_name: sportpass_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sportpass_crm
      POSTGRES_USER: sportpass
      POSTGRES_PASSWORD: sportpass_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportpass -d sportpass_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sportpass_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sportpass:sportpass_pass@postgres:5432/sportpass_crm
      JWT_SECRET: sportpass_jwt_secret_hackathon_2026
      JWT_EXPIRES_IN: 7d
      PORT: 4000
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sportpass_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports:
      - "3000:3000"

volumes:
  postgres_data:
