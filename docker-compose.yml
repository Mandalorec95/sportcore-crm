services:
  postgres:
    image: postgres:16-alpine
    container_name: sportpass_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sportpass_crm
      POSTGRES_USER: sportpass
      POSTGRES_PASSWORD: sportpass_pass
      POSTGRES_INITDB_ARGS: "-c log_statement=all"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_logs:/var/log/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportpass -d sportpass_crm"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sportpass_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sportpass_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://sportpass:sportpass_pass@postgres:5432/sportpass_crm

      # JWT
      JWT_SECRET: ${JWT_SECRET:-sportpass_jwt_secret_hackathon_2026_min_32_chars_required!}
      JWT_EXPIRES_IN: 7d

      # Server
      PORT: 4000
      NODE_ENV: ${NODE_ENV:-development}

      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://frontend:3000}

      # Logging
      LOG_DIR: /app/logs

      # Encryption
      BCRYPT_ROUNDS: 10
    ports:
      - "4000:4000"
    volumes:
      - ./backend/src:/app/src
      - backend_logs:/app/logs
      - backend_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sportpass_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:4000
        NEXT_PUBLIC_API_URL: /api/v1
    container_name: sportpass_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:4000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
      - ./frontend/lib:/app/lib
      - ./frontend/hooks:/app/hooks
      - frontend_node_modules:/app/node_modules
    networks:
      - sportpass_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  postgres_logs:
    driver: local
  backend_logs:
    driver: local
  backend_node_modules:
    driver: local
  frontend_node_modules:
    driver: local

networks:
  sportpass_network:
    driver: bridge
